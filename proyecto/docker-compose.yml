version: '3.8'
services:
  db:
    image: postgres:15-alpine
    container_name: plataforma_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: plataforma_precios
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: plataforma_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data:
